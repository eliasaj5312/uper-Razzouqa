<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوبر رزوقه - HTML5</title>
    <style>
        /* --- تنسيق الصفحة --- */
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
        }

        /* --- حاوية اللعبة --- */
        #gameContainer {
            position: relative;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 80px rgba(92, 148, 252, 0.15);
            overflow: hidden;
        }

        canvas {
            display: block;
            background: #5c94fc;
            width: 900px;
            height: 600px;
        }

        /* --- شريط المعلومات --- */
        #info {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 18px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.55);
            padding: 6px 24px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 5;
            white-space: nowrap;
        }
        #info span {
            color: #ffd700;
        }

        /* --- قائمة البداية --- */
        #startMenu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 30% 30%, #5c94fc, #1a3b7a);
            box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.4);
            color: white;
            text-align: center;
            z-index: 20;
            border-radius: 16px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        #startMenu.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        #startMenu h1 {
            font-size: 64px;
            margin: 0 0 8px 0;
            color: #ffcc00;
            text-shadow: 4px 4px 0 #7a4a12, -2px -2px 0 #7a4a12, 2px -2px 0 #7a4a12, -2px 2px 0 #7a4a12;
            letter-spacing: 4px;
            font-weight: 900;
        }

        #startMenu .subtitle {
            font-size: 22px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 30px;
            border-radius: 40px;
            margin: 0 0 10px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #startMenu .controls {
            font-size: 16px;
            color: #d0e0ff;
            margin: 12px 0 30px 0;
            line-height: 1.8;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 24px;
            border-radius: 12px;
        }
        #startMenu .controls kbd {
            background: rgba(255, 255, 255, 0.15);
            padding: 2px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: inherit;
            color: #ffd700;
        }

        #startButton {
            font-family: inherit;
            font-size: 26px;
            font-weight: bold;
            color: #fff;
            background: #e8302a;
            border: none;
            border-radius: 16px;
            padding: 16px 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #7a1a17, 0 8px 20px rgba(232, 48, 42, 0.4);
            transition: transform 0.08s ease, box-shadow 0.15s ease;
            letter-spacing: 1px;
        }
        #startButton:hover {
            background: #ff3b35;
            transform: scale(1.03);
        }
        #startButton:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #7a1a17;
        }

        @media (max-width: 920px) {
            canvas {
                width: 100vw;
                height: auto;
                aspect-ratio: 900 / 600;
            }
            #info {
                font-size: 13px;
                padding: 4px 12px;
                top: 10px;
                white-space: normal;
            }
            #startMenu h1 {
                font-size: 36px;
            }
            #startMenu .subtitle {
                font-size: 16px;
            }
            #startMenu .controls {
                font-size: 13px;
                padding: 8px 14px;
            }
            #startButton {
                font-size: 18px;
                padding: 12px 30px;
            }
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="900" height="600"></canvas>

    <div id="info">⭐ المرحلة: <span id="level-num">1</span> &nbsp;|&nbsp; 🎮 <kbd>←/→</kbd> للحركة &nbsp; <kbd>Space/↑</kbd> للقفز &nbsp; <kbd>X</kbd> للضربة</div>

    <div id="startMenu">
        <h1>🍄 سوبر رزوقه</h1>
        <div class="subtitle">⚡ المغامرة تبدأ الآن ⚡</div>
        <div class="controls">
            <kbd>←</kbd> <kbd>→</kbd> أو <kbd>A</kbd> <kbd>D</kbd> للحركة &nbsp;|&nbsp;
            <kbd>Space</kbd> أو <kbd>↑</kbd> للقفز &nbsp;|&nbsp;
            <kbd>X</kbd> للضربة<br>
            <span style="color:#ffb3b3;">⚠️ اقفز فوق الأعداء أو اضربهم بـ <kbd>X</kbd> — احذر الشوكي!</span>
        </div>
        <button id="startButton">▶ ابدأ اللعبة</button>
    </div>
</div>
